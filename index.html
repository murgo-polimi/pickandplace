<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Industrial GLB Rendering Lab</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="viewport">
        <canvas id="renderCanvas" aria-label="3D rendering viewport"></canvas>
        <div class="status-strip">
          <span id="statusText">Loading scene</span>
          <span id="metricsText">-</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="Rendering controls">
        <header class="panel-header">
          <div>
            <h1>Rendering Lab</h1>
            <p id="modelTitle">Industrial PBR tuning</p>
          </div>
          <button id="resetView" type="button">Reset</button>
        </header>

        <label class="field">
          <span>Model</span>
          <select id="modelSelect"></select>
        </label>

        <label class="field">
          <span>Profile</span>
          <select id="profileSelect">
            <option value="factory">Factory realism</option>
            <option value="inspection">Inspection light</option>
            <option value="studio">Studio neutral</option>
            <option value="original">Original GLB</option>
          </select>
        </label>

        <div class="switch-grid">
          <label><input id="enhanceMaterials" type="checkbox" checked> Materials</label>
          <label><input id="shadowsEnabled" type="checkbox" checked> Shadows</label>
          <label><input id="aoEnabled" type="checkbox" checked> Occlusion</label>
          <label><input id="bloomEnabled" type="checkbox" checked> Glow</label>
          <label><input id="skyboxEnabled" type="checkbox"> Skybox</label>
          <label><input id="rotateEnabled" type="checkbox"> Rotate</label>
        </div>

        <div class="slider-stack">
          <label class="slider-field">
            <span>Exposure <b id="exposureValue">1.00</b></span>
            <input id="exposure" type="range" min="0.55" max="1.9" step="0.01" value="1">
          </label>
          <label class="slider-field">
            <span>Contrast <b id="contrastValue">1.00</b></span>
            <input id="contrast" type="range" min="0.8" max="1.7" step="0.01" value="1">
          </label>
          <label class="slider-field">
            <span>Environment <b id="environmentValue">1.00</b></span>
            <input id="environment" type="range" min="0.15" max="2.4" step="0.01" value="1">
          </label>
          <label class="slider-field">
            <span>Floor Tiling <b id="floorTileValue">6</b></span>
            <input id="floorTile" type="range" min="2" max="24" step="1" value="6">
          </label>
          <label class="slider-field">
            <span>Floor Bump <b id="floorBumpValue">0.03</b></span>
            <input id="floorBump" type="range" min="0" max="0.3" step="0.01" value="0.03">
          </label>
          <label class="slider-field">
            <span>Floor Roughness <b id="floorRoughnessValue">0.72</b></span>
            <input id="floorRoughness" type="range" min="0.35" max="1" step="0.01" value="0.72">
          </label>
        </div>

        <div class="button-row">
          <button id="snapshot" type="button">Snapshot</button>
          <button id="compareToggle" type="button" aria-pressed="false">Compare Original</button>
        </div>

        <section class="material-readout" aria-label="Loaded material summary">
          <h2>Materials</h2>
          <ul id="materialList"></ul>
        </section>
      </aside>
    </main>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="./viewer.js?v=20260708-part-color-variants"></script>
  </body>
</html>
